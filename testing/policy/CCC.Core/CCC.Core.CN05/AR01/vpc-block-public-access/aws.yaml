name: VPC Block Public Ingress (AWS)
service_type: vpc
requirement_text: >
  When an attempt is made to modify data on the service or a child
  resource, the service MUST block requests from unauthorized entities.
  Security groups in the VPC must not allow unrestricted public ingress (0.0.0.0/0).

validity_score: 7
validity_commentary: >
  This query validates that no security groups in the VPC have inbound rules
  allowing traffic from 0.0.0.0/0. Unrestricted public ingress increases the
  risk of unauthorized access and data modification. Strengths:
  - Directly queries security groups in the VPC
  - Detects overly permissive CIDR rules
  - Aligns with network isolation best practices
  Limitations:
  - Does not validate NACLs or instance-level firewall rules
  - Does not check for IPv6 (::/0) public access
  - Does not validate that resources are in private subnets

query: |
  aws ec2 describe-security-groups \
    --filters Name=vpc-id,Values=${UID} Name=ip-permission.cidr,Values=0.0.0.0/0 \
    --query "SecurityGroups" \
    --output json

rules:
  - jsonpath: "$"
    expected_values: []
    validation_rule: "^\\[\\]$"
    description: >
      Validates that no security groups in the VPC allow ingress from 0.0.0.0/0.
      An empty array indicates compliance. Any security group returned would
      have overly permissive public access and would fail this check.

name: GCP Load Balancer Unencrypted Traffic Block Check
service_type: load-balancer
requirement_text: >
  Unencrypted traffic MUST be blocked or redirected to secure equivalents so that
  no data is transmitted in plaintext.

validity_score: 7
validity_commentary: >
  This query validates TLS policy configuration on GCP HTTPS Load Balancers.
  When the SSL policy requires TLS 1.3, all traffic through the load balancer
  must be encrypted. Strengths:
  - GCP SSL policies enforce minimum TLS version
  - RESTRICTED/MODERN profiles block weak protocols
  Limitations:
  - Does not validate HTTP-to-HTTPS redirect at the URL map level
  - Direct VM connections bypassing the load balancer are not covered

query: |
  gcloud compute ssl-policies describe ${ResourceName} \
    --project=${GcpProjectId} \
    --format=json

rules:
  - jsonpath: "$.minTlsVersion"
    expected_values:
      - "TLS_1_3"
    validation_rule: "^TLS_1_3$"
    description: >
      Verifies that the minimum TLS version is set to TLS 1.3.
      Ensures all traffic is encrypted.

  - jsonpath: "$.profile"
    expected_values:
      - "RESTRICTED"
      - "MODERN"
      - "CUSTOM"
    validation_rule: "^(RESTRICTED|MODERN|CUSTOM)$"
    description: >
      Validates the SSL policy profile. RESTRICTED and MODERN profiles
      provide strong security defaults and block unencrypted traffic.

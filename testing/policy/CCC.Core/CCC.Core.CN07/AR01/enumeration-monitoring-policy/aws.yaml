name: AWS Enumeration Monitoring Policy Check
service_type: object-storage
requirement_text: >
  Enumeration activities must be monitored and generate events
  that can be sent to monitored channels.

validity_score: 8
validity_commentary: >
  This query validates that GuardDuty is enabled in the region, which provides
  automatic monitoring for reconnaissance/enumeration activities.

query: |
  aws guardduty list-detectors --region ${AwsRegion} --output json

rules:
  - jsonpath: "$.DetectorIds[0]"
    expected_values: []
    validation_rule: "^.+$"
    description: >
      Verifies that a GuardDuty detector exists in the region.
      GuardDuty monitors CloudTrail events for discovery/enumeration activity.

name: Azure Storage Enumeration Monitoring Policy Check
service_type: object-storage
requirement_text: >
  Enumeration activities must be monitored and generate events
  that can be sent to monitored channels.

validity_score: 9
validity_commentary: >
  This query validates monitoring configuration at the Azure Storage Account level.

query: |
  az monitor diagnostic-settings list \
    --resource /subscriptions/${AzureSubscriptionId}/resourceGroups/${AzureResourceGroup}/providers/Microsoft.Storage/storageAccounts/${AzureStorageAccount} \
    --query "value[?logs[?categoryGroup=='audit' && enabled==\`true\`]]" \
    --output json

rules:
  - jsonpath: "$.[0].logs[?(@.categoryGroup=='audit')].enabled"
    expected_values:
      - true
    validation_rule: "^true$"
    description: >
      Verifies that diagnostic settings are configured to audit enumeration activities.

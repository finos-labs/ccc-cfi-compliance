name: Azure Storage Enumeration Logging Policy Check
service_type: object-storage
requirement_text: >
  Enumeration activities must be logged.

validity_score: 9
validity_commentary: >
  This query validates that diagnostic settings are configured for the blob service.

query: |
  az monitor diagnostic-settings list \
    --resource "/subscriptions/${AzureSubscriptionID}/resourceGroups/${AzureResourceGroup}/providers/Microsoft.Storage/storageAccounts/${AzureStorageAccount}/blobServices/default" \
    --query "[0]" \
    --output json

rules:
  # Accept either .category (StorageRead etc.) or .categoryGroup (audit) - mutually exclusive in Azure
  - jsonpath: "$"
    expected_values: []
    validation_rule: "(category|categoryGroup).*enabled.*true|enabled.*true.*(category|categoryGroup)"
    description: >
      Verifies that at least one log category or category group is enabled.

name: AWS S3 Default Object Retention Policy Check
service_type: object-storage
requirement_text: >
  Objects MUST automatically receive a default retention policy upon upload,
  protecting critical data from premature deletion or modification.

validity_score: 9
validity_commentary: >
  This query validates that S3 Object Lock is enabled with a default retention
  rule set at the bucket level, so all newly uploaded objects automatically
  inherit the retention policy.
  Strengths:
  - Default retention ensures every object is protected at upload time
  - Object Lock in Compliance mode prevents circumvention
  - Directly queries the bucket-level default retention configuration
  Limitations:
  - Does not validate that the retention duration meets a specific minimum

query: |
  aws s3api get-object-lock-configuration \
    --bucket ${ResourceName}

rules:
  - jsonpath: "$.ObjectLockConfiguration.ObjectLockEnabled"
    expected_values:
      - "Enabled"
    validation_rule: "^Enabled$"
    description: Verifies that Object Lock is enabled on the bucket.
  - jsonpath: "$.ObjectLockConfiguration.Rule.DefaultRetention.Days"
    expected_values: []
    validation_rule: "^[1-9][0-9]*$"
    description: >
      Verifies that a default retention period (in days) is configured and
      greater than zero, ensuring all newly uploaded objects are protected.

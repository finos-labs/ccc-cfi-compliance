name: GCP Cloud Storage Retention Enforcement Check
service_type: object-storage
requirement_text: >
  The service MUST prevent deletion or modification of objects under active
  retention, maintaining data integrity and compliance requirements.

validity_score: 9
validity_commentary: >
  This query validates that a retention policy is configured and locked on the
  GCP bucket. A locked retention policy prevents deletion or modification of
  any object before its retention period has elapsed.
  Strengths:
  - Locked policy cannot be shortened, removed, or overridden
  - Directly queries the retention policy lock status
  - Consistent with GCP compliance best practices
  Limitations:
  - Does not validate the specific retention duration

query: |
  gcloud storage buckets describe gs://${ResourceName} \
    --format="json(retentionPolicy)"

rules:
  - jsonpath: "$.retentionPolicy.retentionPeriod"
    expected_values: []
    validation_rule: "^[1-9][0-9]*$"
    description: Verifies that a retention period is configured on the bucket.
  - jsonpath: "$.retentionPolicy.isLocked"
    expected_values:
      - true
    validation_rule: "^true$"
    description: >
      Verifies that the retention policy is locked, preventing deletion or
      modification of objects before their retention period expires.

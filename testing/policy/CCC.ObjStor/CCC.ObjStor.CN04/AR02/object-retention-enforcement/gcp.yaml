name: GCP Cloud Storage Object Retention Enforcement Check
service_type: object-storage
requirement_text: >
  The service MUST prevent deletion or modification of objects under active
  retention, maintaining data integrity and compliance requirements.

validity_score: 9
validity_commentary: >
  This query validates that a retention policy is configured and locked on the
  GCP bucket, preventing deletion or modification of any object before its
  retention period has elapsed.
  Strengths:
  - Locked policy cannot be shortened, removed, or overridden
  - Directly queries the retention policy lock status
  - Consistent with GCP compliance best practices
  Limitations:
  - Retention period is specified in seconds in GCP

query: |
  gcloud storage buckets describe gs://${ResourceName} \
    --format="json(retentionPolicy)"

rules:
  - jsonpath: "$.retentionPolicy.isLocked"
    expected_values:
      - true
    validation_rule: "^true$"
    description: >
      Verifies that the retention policy is locked, enforcing retention and
      preventing object deletion or modification before the period expires.
  - jsonpath: "$.retentionPolicy.retentionPeriod"
    expected_values:
      - "${ObjectStorageRetentionPeriodSeconds}"
    description: >
      Verifies that the retention period meets the configured minimum (seconds),
      confirming objects are actively protected from modification or deletion.

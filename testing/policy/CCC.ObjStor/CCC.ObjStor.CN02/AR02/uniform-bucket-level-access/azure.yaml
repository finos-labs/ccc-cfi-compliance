name: Azure Blob Uniform Access Check
service_type: object-storage
requirement_text: >
  The service MUST enforce uniform bucket-level access, preventing ad-hoc
  object-level permissions.

validity_score: 8
validity_commentary: >
  This query checks if public access is disabled and if the storage account
  configuration supports uniform access. Azure by default uses RBAC which
  is uniform at the container level if implemented correctly.
  Strengths:
  - Checks for disabling of public access
  - Focuses on management-level configuration

query: |
  az storage account show \
    --name ${AzureStorageAccount} \
    --resource-group ${AzureResourceGroup} \
    --query "{publicAccess:allowBlobPublicAccess}" \
    --output json

rules:
  - jsonpath: "$.publicAccess"
    expected_values:
      - false
    validation_rule: "^false$"
    description: >
      Verifies that public access to blobs is disabled at the account level.

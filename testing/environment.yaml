instances:

  - id: main-aws
    properties:
      provider: aws
      region: us-east-1

    rules:
      permitted-regions: [us-east-1]
      # CN05.AR03: AWS account IDs allowed for cross-account bucket access. Empty = none.
      # Comma-separated, e.g. "123456789012,234567890123"
      permitted-account-ids: ""

    services:
      - type: object-storage
        # CN04.AR02: Minimum retention period in days for policy checks
        object-storage-retention-period-days: 2
      - type: logging
        aws-cloud-trail-log-group-name: cfi-test-log-group
      - type: vpc
        # All values populated at runtime via ${VAR} substitution (os.ExpandEnv
        # in envconfig.go) from Terraform outputs exported after apply.
        # For manual runs, set the corresponding env vars or replace with explicit values.
        #
        # CN03: IaC-provisioned VPC IDs flow in automatically via env vars — the list
        # fields below are for explicit manual additions only. Duplicates across all
        # sources are deduplicated automatically.
        cn03-receiver-vpc-id: "${CN03_RECEIVER_VPC_ID}"
        cn03-non-allowlisted-requester-vpc-id: "${CN03_NON_ALLOWLISTED_REQUESTER_VPC_ID}"
        cn03-allowed-requester-vpc-ids:
          # Add explicit VPC IDs here to include on top of IaC-provisioned ones:
          # - "vpc-abc123"
        cn03-disallowed-requester-vpc-ids:
          # Add explicit VPC IDs here to include on top of IaC-provisioned ones:
          # - "vpc-def456"
        cn03-allowed-requester-vpc-ids-csv: "${CN03_ALLOWED_REQUESTER_VPC_IDS}"
        cn03-disallowed-requester-vpc-ids-csv: "${CN03_DISALLOWED_REQUESTER_VPC_IDS}"
        # CN04: flow log group name for behavioral observation scenarios.
        cn04-flow-log-group-name: "${CN04_FLOW_LOG_GROUP_NAME}"
        # Bad VPC: intentionally non-compliant VPC for CN02/CN04 negative checks.
        bad-vpc-id: "${BAD_VPC_ID}"

  - id: main-azure
    properties:
      provider: azure
      region: eastus
      azure-subscription-id: c1cedd8e-bf91-4d7d-a4cc-45700402a2a1
      azure-resource-group: "cfi_test_${INSTANCE_ID}"

    rules:
      permitted-regions: [eastus]
      # CN05.AR03: Storage accounts allowed as object replication destinations. Empty = none.
      # Account names or full resource IDs, e.g. ["partner-dest", "/subscriptions/.../storageAccounts/partner-dest"]
      permitted-destination-storage-accounts: []
        # CN08.AR02: Expected replication locations (primary + secondary for GRS)
      replication-locations: [eastus, westus]

    services:
      - type: object-storage
        azure-storage-account: "storagecfitest${INSTANCE_ID}"
        # CN04.AR02: Minimum immutability period in days for policy checks (matches TF)
        object-storage-retention-period-days: 2
        default-container: "ccc-test-container-${INSTANCE_ID}"
      - type: logging 

  - id: main-gcp
    properties:
      provider: gcp
      region: us-central1
      gcp-project-id: nodal-time-474015-p5

    rules:
      permitted-regions: [us-central1]
      # CN05.AR03: GCP project IDs allowed for cross-project bucket access. Empty = none.
      # Comma-separated, e.g. "partner-proj-1,partner-proj-2"
      permitted-project-ids: ""

    services:
      - type: object-storage
        gcp-bucket-name: "ccc-test-bucket-${INSTANCE_ID}"
        # CN04.AR02: Minimum retention period in seconds for policy checks (2 days)
        object-storage-retention-period-seconds: 172800
      - type: logging
        gcp-log-bucket-name: cfi-test-log-bucket
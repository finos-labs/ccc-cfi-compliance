name: CFI Build and Test  # Note - this action must be called cfi-test.yml for results to be pulled into CCC.

permissions:
  id-token: write
  contents: read

concurrency:
  group: cfi-test
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      instance_id:
        description: "Reuse this INSTANCE_ID (existing infra). Skips sourcing terraform_setup.env—set TF_VAR_instance_id only. Leave empty to generate a new ID."
        required: false
        type: string
        default: ""
  push:
    branches:
      - '**'

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate matrix from config files
        id: set-matrix
        run: |
          TARGETS_DIR=config
          matrix='{"target": []}'
          CURRENT_BRANCH="${GITHUB_REF_NAME}"

          for target_file in $TARGETS_DIR/*.json; do
            if [[ "$target_file" != *".json" ]]; then
              continue
            fi
            tb_len=$(jq '.["test-on-branches"] // [] | length' "$target_file")
            if [[ "$tb_len" -gt 0 ]] && ! jq -e --arg b "$CURRENT_BRANCH" '(.["test-on-branches"] | index($b)) != null' "$target_file" >/dev/null 2>&1; then
              echo "Skipping $(basename "$target_file"): test-on-branches does not include \"$CURRENT_BRANCH\""
              continue
            fi

            target_json=$(jq -c '.' "$target_file")
            matrix=$(echo "$matrix" | jq --argjson target "$target_json" '.target += [$target]')
          done

          echo "matrix={\"target\": $(echo "$matrix" | jq -c '.target')}" >> $GITHUB_OUTPUT
          echo "Generated matrix with $(echo "$matrix" | jq '.target | length') targets"

  test:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      matrix:
        target: ${{ fromJson(needs.prepare-matrix.outputs.matrix).target }}
      fail-fast: false

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      OUTPUT_DIR: results
      PROWLER_BRANCH: master
      RUN_PROWLER: ${{ contains(matrix.target.test-frameworks || fromJson('[]'), 'prowler') }}
      RUN_CFI: ${{ contains(matrix.target.test-frameworks || fromJson('[]'), 'cfi') }}
      TARGET_ID: ${{ matrix.target.id }}
      TARGET_NAME: ${{ matrix.target.name }}
      TARGET_PATH: ${{ matrix.target.path }}
      TARGET_PROVIDER: ${{ matrix.target.provider }}
      TARGET_SERVICE: ${{ matrix.target.service }}
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Terraform setup (load testing env)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.instance_id }}" ]; then
            export INSTANCE_ID="${{ inputs.instance_id }}"
            echo "📋 INSTANCE_ID set from workflow_dispatch; terraform_setup.env will keep it"
          else
            echo "📋 INSTANCE_ID unset; terraform_setup.env will generate UTC compact id"
          fi
          set -a
          source testing/terraform_setup.env
          set +a
          # Persist for later job steps (Terraform apply, compliance tests / envconfig)
          env | grep -E '^(INSTANCE_ID|TF_VAR_|AWS_|ARM_|CN_TEST_)' >> $GITHUB_ENV
          echo "✅ Environment variables loaded and envconfig initialized"

      - name: Configure AWS Credentials (OIDC)
        if: matrix.target.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/TerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure Azure Credentials (OIDC)
        if: matrix.target.provider == 'azure'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Authenticate to Google Cloud (OIDC)
        if: matrix.target.provider == 'gcp'
        uses: google-github-actions/auth@v1
        with:
          token_format: "id_token"
          id_token_audience: "https://iam.googleapis.com/projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/finos-oidc-pool/providers/github-provider"
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/finos-oidc-pool/providers/github-provider"
          service_account: "gha-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "testing/go.mod"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        id: terraform-apply
        if: github.event_name != 'workflow_dispatch' || inputs.instance_id == ''
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/$TARGET_PATH"

          if [ "$TARGET_PROVIDER" = "aws" ]; then
            terraform init
            terraform apply -auto-approve -input=false
          elif [ "$TARGET_PROVIDER" = "azure" ]; then
            export ARM_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            terraform init -upgrade
            terraform apply -auto-approve -input=false
          elif [ "$TARGET_PROVIDER" = "gcp" ]; then
            export TF_VAR_gcp_project_id="${{ secrets.GCP_PROJECT_ID }}"
            terraform init
            terraform apply -auto-approve -input=false
          fi
          echo "✅ Terraform apply completed for $TARGET_ID"

      - name: Install testssl.sh
        run: |
          echo "📦 Installing testssl.sh..."
          git clone --depth 1 https://github.com/drwetter/testssl.sh.git /opt/testssl
          sudo ln -s /opt/testssl/testssl.sh /usr/local/bin/testssl.sh
          testssl.sh --version || true
          echo "✅ testssl.sh installed"

      - name: Cache Python Poetry virtualenv
        if: env.RUN_PROWLER == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.virtualenvs
            prowler/.venv
          key: prowler-${{ hashFiles('prowler/poetry.lock') }}
          restore-keys: prowler-

      - name: Install Prowler and Python deps
        if: env.RUN_PROWLER == 'true'
        run: |
          git clone -b ${{ env.PROWLER_BRANCH }} --single-branch https://github.com/prowler-cloud/prowler
          cd prowler
          pipx install poetry
          poetry install

      - name: Refresh AWS Credentials for Prowler (OIDC)
        if: env.RUN_PROWLER == 'true' && matrix.target.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/TerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Refresh Azure Credentials for Prowler (OIDC)
        if: env.RUN_PROWLER == 'true' && matrix.target.provider == 'azure'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Refresh GCP Credentials for Prowler (OIDC)
        if: env.RUN_PROWLER == 'true' && matrix.target.provider == 'gcp'
        uses: google-github-actions/auth@v1
        with:
          token_format: "id_token"
          id_token_audience: "https://iam.googleapis.com/projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/finos-oidc-pool/providers/github-provider"
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/finos-oidc-pool/providers/github-provider"
          service_account: "gha-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Run Prowler Scan
        if: env.RUN_PROWLER == 'true'
        id: prowler-scan
        continue-on-error: true
        run: |
          set -euo pipefail

          echo "🔍 Running Prowler scan for $TARGET_ID..."
          cd "$GITHUB_WORKSPACE/prowler"
          mkdir -p output

          if [ "$TARGET_PROVIDER" = "aws" ]; then
            poetry run python prowler-cli.py aws --output-filename scan
          elif [ "$TARGET_PROVIDER" = "azure" ]; then
            poetry run python prowler-cli.py azure --az-cli-auth --output-filename scan
          elif [ "$TARGET_PROVIDER" = "gcp" ]; then
            poetry run python prowler-cli.py gcp --project-id ${{ secrets.GCP_PROJECT_ID }} --output-filename scan
          fi

          echo "✅ Prowler scan completed for $TARGET_ID"

      - name: Modify Prowler metadata
        if: always() && env.RUN_PROWLER == 'true'
        id: modify-prowler-metadata
        continue-on-error: true
        run: |
          set -euo pipefail

          echo "✏️  Modifying Prowler metadata for $TARGET_ID..."
          cd "$GITHUB_WORKSPACE/prowler/output"

          # Find the scan file
          SCAN_FILE=$(ls -t scan*.ocsf.json 2>/dev/null | head -n 1)

          # Modify scan file
          if [ -n "$SCAN_FILE" ] && [ -f "$SCAN_FILE" ]; then
            echo "📝 Modifying scan metadata..."
            jq 'map(.metadata.product.name = "Prowler")' "$SCAN_FILE" > scan-modified.ocsf.json
            echo "✅ Created scan-modified.ocsf.json"
          fi

          echo "✅ Prowler metadata modifications completed"

      # =======================================================================
      # CN03 — Load peering trial artifacts (AWS VPC only)
      # Downloads artifacts uploaded by cfi-nuke-and-rebuild and sources
      # cn03-feature.env to populate CN03_* env vars for feature scenarios.
      # Skipped gracefully if artifacts are not yet available.
      # =======================================================================
      - name: Download CN03 artifacts
        if: matrix.target.provider == 'aws' && matrix.target.service == 'networking'
        uses: actions/download-artifact@v4
        with:
          name: cn03-artifacts-${{ matrix.target.id }}
          path: cn03-artifacts/
        continue-on-error: true

      - name: Load CN03 environment
        if: matrix.target.provider == 'aws' && matrix.target.service == 'networking'
        run: |
          ENV_FILE="cn03-artifacts/cn03-feature.env"
          if [ -f "$ENV_FILE" ]; then
            echo "📋 Loading CN03 feature environment..."
            grep -v '^#' "$ENV_FILE" | grep -v '^$' | sed "s/^export //; s/=''$/=/" >> $GITHUB_ENV
            # Override matrix file path to runner-local location
            echo "CN03_PEER_TRIAL_MATRIX_FILE=$GITHUB_WORKSPACE/cn03-artifacts/cn03-peer-trials.json" >> $GITHUB_ENV
            echo "✅ CN03 environment loaded"
          else
            echo "⚠️  CN03 artifacts not found — CN03 scenarios requiring env vars will be skipped"
          fi

      - name: Refresh AWS Credentials for Compliance Tests (OIDC)
        if: env.RUN_CFI == 'true' && matrix.target.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/TerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Refresh Azure Credentials for Compliance Tests (OIDC)
        if: env.RUN_CFI == 'true' && matrix.target.provider == 'azure'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Refresh GCP Credentials for Compliance Tests (OIDC)
        if: env.RUN_CFI == 'true' && matrix.target.provider == 'gcp'
        uses: google-github-actions/auth@v1
        with:
          token_format: "id_token"
          id_token_audience: "https://iam.googleapis.com/projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/finos-oidc-pool/providers/github-provider"
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/finos-oidc-pool/providers/github-provider"
          service_account: "gha-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Run Compliance Tests
        if: env.RUN_CFI == 'true'
        id: compliance-tests
        continue-on-error: true
        run: |
          set -euo pipefail

          echo "🧪 Running compliance tests for $TARGET_ID..."
          cd "$GITHUB_WORKSPACE/testing"

          chmod +x run-compliance-tests.sh

          # Map provider to target instance ID (from environment.yaml)
          case "$TARGET_PROVIDER" in
            aws)   TARGET_INSTANCE_ID="main-aws" ;;
            azure) TARGET_INSTANCE_ID="main-azure" ;;
            gcp)   TARGET_INSTANCE_ID="main-gcp" ;;
            *)     echo "❌ Unknown provider: $TARGET_PROVIDER"; exit 1 ;;
          esac

          # Map config service to compliance service type (storage → object-storage, networking → vpc)
          case "$TARGET_SERVICE" in
            storage)    SERVICE_TYPE="object-storage" ;;
            networking) SERVICE_TYPE="vpc" ;;
            *)          SERVICE_TYPE="$TARGET_SERVICE" ;;
          esac

          ./run-compliance-tests.sh --instance "$TARGET_INSTANCE_ID" --service "$SERVICE_TYPE" --output "output"

          echo "✅ Compliance tests completed for $TARGET_ID"

      - name: Copy OCSF Results
        if: always()
        run: |
          # Create output directory
          mkdir -p ${{ env.OUTPUT_DIR }}

          # Copy Prowler OCSF results (if Prowler was run)
          if [ "${{ env.RUN_PROWLER }}" = "true" ]; then
            cd "$GITHUB_WORKSPACE/prowler/output"
            if [ -f "scan-modified.ocsf.json" ]; then
              cp "scan-modified.ocsf.json" "../../${{ env.OUTPUT_DIR }}/${TARGET_ID}-prowler.ocsf.json"
              echo "✅ Successfully captured Prowler output for $TARGET_ID"
            else
              echo "⚠️  No Prowler OCSF file found for $TARGET_ID"
            fi
          fi

          # Copy compliance test results (if CFI tests were run)
          if [ "${{ env.RUN_CFI }}" = "true" ]; then
            cd "$GITHUB_WORKSPACE/testing/output"
            if ls *.ocsf.json *.html 2>/dev/null | head -1 > /dev/null; then
              for f in *.ocsf.json *.html; do
                [ -f "$f" ] && cp "$f" "../../${{ env.OUTPUT_DIR }}/${TARGET_ID}-${f}"
              done
              echo "✅ Successfully captured compliance test output for $TARGET_ID"
            else
              echo "⚠️  No compliance test output files found for $TARGET_ID"
            fi
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: cfi-results-${{ matrix.target.id }}
          path: |
            ${{ env.OUTPUT_DIR }}
            config/${{ matrix.target.id }}.json

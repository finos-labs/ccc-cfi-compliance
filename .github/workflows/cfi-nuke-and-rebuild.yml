name: CFI Nuke and Rebuild

permissions:
  id-token: write
  contents: read

concurrency:
  group: cfi-infra
  cancel-in-progress: false

on:
  schedule:
    # Run every morning at 4 AM UTC (11 PM EST / 8 PM PST)
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate matrix from config files
        id: set-matrix
        run: |
          TARGETS_DIR=config
          matrix='{"target": []}'

          for target_file in $TARGETS_DIR/*.json; do
            if [[ "$target_file" == *".json" ]]; then
              target_json=$(jq -c '.' "$target_file")
              matrix=$(echo "$matrix" | jq --argjson target "$target_json" '.target += [$target]')
            fi
          done

          echo "matrix={\"target\": $(echo "$matrix" | jq -c '.target')}" >> $GITHUB_OUTPUT
          echo "Generated matrix with $(echo "$matrix" | jq '.target | length') targets"

  nuke-and-rebuild:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      matrix:
        target: ${{ fromJson(needs.prepare-matrix.outputs.matrix).target }}
      fail-fast: false

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TARGET_ID: ${{ matrix.target.id }}
      TARGET_NAME: ${{ matrix.target.name }}
      TARGET_PATH: ${{ matrix.target.path }}
      TARGET_PROVIDER: ${{ matrix.target.provider }}
      TARGET_SERVICE: ${{ matrix.target.service }}
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_target_id: ${{ matrix.target.id }}
      TF_VAR_github_run_id: ${{ github.run_id }}
      TF_VAR_github_run_number: ${{ github.run_number }}
      TF_VAR_github_actor: ${{ github.actor }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_github_workflow: ${{ github.workflow }}
      TF_VAR_github_sha: ${{ github.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Load compliance testing environment
        run: |
          echo "📋 Loading compliance testing environment..."
          grep -v '^#' testing/compliance-testing.env | grep -v '^$' >> $GITHUB_ENV
          echo "✅ Environment variables loaded"

      # =======================================================================
      # Authentication
      # =======================================================================
      - name: Configure AWS Credentials (OIDC)
        if: matrix.target.provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/TerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure Azure Credentials (OIDC)
        if: matrix.target.provider == 'azure'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Authenticate to Google Cloud (OIDC)
        if: matrix.target.provider == 'gcp'
        uses: google-github-actions/auth@v1
        with:
          token_format: "id_token"
          id_token_audience: "https://iam.googleapis.com/projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/finos-oidc-pool/providers/github-provider"
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/finos-oidc-pool/providers/github-provider"
          service_account: "gha-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      # =======================================================================
      # Nuke - Clean up existing resources for this provider
      # =======================================================================
      - name: Install nuke tool
        run: |
          if [ "$TARGET_PROVIDER" = "aws" ]; then
            BINARY_URL="https://github.com/ekristen/aws-nuke/releases/download/v3.60.1/aws-nuke-v3.60.1-linux-amd64.tar.gz"
            BINARY_NAME="aws-nuke"
          elif [ "$TARGET_PROVIDER" = "azure" ]; then
            BINARY_URL="https://github.com/ekristen/azure-nuke/releases/download/v1.2.3/azure-nuke-v1.2.3-linux-amd64.tar.gz"
            BINARY_NAME="azure-nuke"
          elif [ "$TARGET_PROVIDER" = "gcp" ]; then
            BINARY_URL="https://github.com/ekristen/gcp-nuke/releases/download/v1.8.1/gcp-nuke-v1.8.1-linux-amd64.tar.gz"
            BINARY_NAME="gcp-nuke"
          fi

          echo "📦 Installing $BINARY_NAME..."
          wget -q "$BINARY_URL"
          tar -xzf *.tar.gz
          sudo mv "$BINARY_NAME" /usr/local/bin/
          sudo chmod +x /usr/local/bin/"$BINARY_NAME"
          $BINARY_NAME --version
          echo "✅ $BINARY_NAME installed"

      - name: Run nuke
        continue-on-error: true
        run: |
          echo "💥 Running nuke for $TARGET_PROVIDER..."

          if [ "$TARGET_PROVIDER" = "aws" ]; then
            aws-nuke run \
              --config .github/workflows/nuke/aws-nuke-config.yaml \
              --no-dry-run \
              --force || true
          elif [ "$TARGET_PROVIDER" = "azure" ]; then
            # Get OIDC token
            FEDERATED_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r '.value')
            
            if [ -n "$FEDERATED_TOKEN" ] && [ "$FEDERATED_TOKEN" != "null" ]; then
              echo "$FEDERATED_TOKEN" > /tmp/azure-federated-token.txt
              azure-nuke run \
                --config .github/workflows/nuke/azure-nuke-config.yaml \
                --tenant-id ${{ secrets.AZURE_TENANT_ID }} \
                --client-id ${{ secrets.AZURE_CLIENT_ID }} \
                --subscription-id ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
                --client-federated-token-file /tmp/azure-federated-token.txt \
                --no-dry-run \
                --force || true
              rm -f /tmp/azure-federated-token.txt
            fi
          elif [ "$TARGET_PROVIDER" = "gcp" ]; then
            gcp-nuke run \
              --config .github/workflows/nuke/gcp-nuke-config.yaml \
              --project-id ${{ secrets.GCP_PROJECT_ID }} \
              --no-dry-run \
              --no-prompt || true
          fi

          echo "✅ Nuke completed for $TARGET_PROVIDER"

      # =======================================================================
      # Rebuild - Terraform apply
      # =======================================================================
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        id: terraform-apply
        run: |
          set -euo pipefail

          echo "🚀 Deploying: $TARGET_NAME (id: $TARGET_ID)"
          echo "📁 Path: $TARGET_PATH"
          echo "☁️  Provider: $TARGET_PROVIDER"

          cd "$GITHUB_WORKSPACE/$TARGET_PATH"

          if [ "$TARGET_PROVIDER" = "aws" ]; then
            terraform init
            terraform apply -auto-approve -input=false
          elif [ "$TARGET_PROVIDER" = "azure" ]; then
            export ARM_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            terraform init -upgrade
            terraform apply -auto-approve -input=false
          elif [ "$TARGET_PROVIDER" = "gcp" ]; then
            export TF_VAR_gcp_project_id="${{ secrets.GCP_PROJECT_ID }}"
            terraform init
            terraform apply -auto-approve -input=false
          fi

          echo "✅ Terraform apply completed for $TARGET_ID"

      # =======================================================================
      # CN03 — Export peering trial artifacts (AWS VPC only)
      # Runs export-cn03-artifacts.sh from the Terraform working directory and
      # uploads cn03-peer-trials.json + cn03-feature.env for use by cfi-test.
      # =======================================================================
      - name: Export CN03 artifacts
        if: steps.terraform-apply.outcome == 'success' && matrix.target.provider == 'aws' && matrix.target.service == 'networking'
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/output/cn03"
          cd "$GITHUB_WORKSPACE/$TARGET_PATH"
          chmod +x "$GITHUB_WORKSPACE/remote/aws/vpc/export-cn03-artifacts.sh"
          "$GITHUB_WORKSPACE/remote/aws/vpc/export-cn03-artifacts.sh" "$GITHUB_WORKSPACE/output/cn03"
          echo "✅ CN03 artifacts exported"

      - name: Upload CN03 artifacts
        if: steps.terraform-apply.outcome == 'success' && matrix.target.provider == 'aws' && matrix.target.service == 'networking'
        uses: actions/upload-artifact@v4
        with:
          name: cn03-artifacts-${{ matrix.target.id }}
          path: output/cn03/
          retention-days: 30

      # =======================================================================
      # Save results
      # =======================================================================
      - name: Save output
        if: always()
        run: |
          mkdir -p output
          cat > output/${{ matrix.target.id }}-log.txt << EOF
          Nuke and Rebuild completed at $(date)
          Target: ${{ matrix.target.id }}
          Provider: ${{ matrix.target.provider }}
          Terraform outcome: ${{ steps.terraform-apply.outcome }}
          Workflow: ${{ github.workflow }}
          Run ID: ${{ github.run_id }}
          EOF

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuke-rebuild-${{ matrix.target.id }}
          path: output/
          retention-days: 30

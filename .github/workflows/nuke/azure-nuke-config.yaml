blocklist:
  - "00000000-0000-0000-0000-000000000000" # Prevent accidental deletion in wrong subscription

regions:
  - global
  - all

resource-types:
  excludes:
    - Application
    - ApplicationFederatedCredential
    - ServicePrincipal
    - SubscriptionRoleAssignment
    # Subscription/management-group level - require elevated permissions or cause API errors
    - PolicyAssignment
    - SecurityPricing

accounts:
  "fa193ac0-9c06-4111-bf55-341e4db193d3":
    filters:
      ResourceGroup:
        - property: Name
          type: exact
          value: "cfi_test"
        - property: tag:CCC_INFRA_DONT_DELETE
          type: exact
          value: "true"
      StorageAccount:
        - property: tag:CCC_INFRA_DONT_DELETE
          type: exact
          value: "true"
      LogAnalyticsWorkspace:
        - property: tag:CCC_INFRA_DONT_DELETE
          type: exact
          value: "true"
      BlobContainer:
        - property: tag:CCC_INFRA_DONT_DELETE
          type: exact
          value: "true"
